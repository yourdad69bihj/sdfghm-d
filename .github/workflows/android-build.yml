name: Build Vulcan APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Force-Create Config Files
        run: |
          if [ ! -f package.json ]; then
            echo '{"name":"vulcan","version":"1.0.0","dependencies":{"@capacitor/android":"^5.0.0","@capacitor/cli":"^5.0.0","@capacitor/core":"^5.0.0"}}' > package.json
          fi

      - name: Build and Init Capacitor
        run: |
          npm install
          npx cap init "VulcanInject" "com.jordan.vulcan" --web-dir .
          npx cap add android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Vulcan-9.9M-Injector-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
